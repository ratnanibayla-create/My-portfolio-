<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bayla's Swiftie Page</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="home">

  <!-- Crumbled paper corners -->
  <div class="paper paper-top-left"></div>
  <div class="paper paper-bottom-right"></div>

  <!-- Swiftie-style bracelets around the page -->
  <div class="bracelet bracelet-top" aria-hidden="true">
    <span class="bead">♡</span>
    <span class="bead letter">S</span>
    <span class="bead letter">W</span>
    <span class="bead letter">I</span>
    <span class="bead letter">F</span>
    <span class="bead letter">T</span>
    <span class="bead">☆</span>
  </div>

  <div class="bracelet bracelet-bottom" aria-hidden="true">
    <span class="bead">✧</span>
    <span class="bead letter">B</span>
    <span class="bead letter">A</span>
    <span class="bead letter">Y</span>
    <span class="bead letter">L</span>
    <span class="bead letter">A</span>
    <span class="bead">♡</span>
  </div>

  <div class="bracelet bracelet-left" aria-hidden="true">
    <span class="bead">♡</span>
    <span class="bead"></span>
    <span class="bead">☆</span>
    <span class="bead"></span>
    <span class="bead">✧</span>
    <span class="bead"></span>
  </div>

  <div class="bracelet bracelet-right" aria-hidden="true">
    <span class="bead"></span>
    <span class="bead">✦</span>
    <span class="bead"></span>
    <span class="bead">♡</span>
    <span class="bead"></span>
    <span class="bead">☆</span>
  </div>

  <!-- Cute Taylor-inspired notes around the page -->
  <div class="note note-1">glitter in the hallway</div>
  <div class="note note-2">friendship bracelet magic</div>
  <div class="note note-3">pink clouds & guitar strings</div>
  <div class="note note-4">heart hands forever</div>
  <div class="note note-5">dancing in pastel light</div>
  <div class="note note-6">eras energy</div>

  <!-- Main middle text -->
  <main class="center-card">
    <h1>Bayla</h1>
    <p>Swiftie sparkle page</p>
    <div class="button-row">
      <a class="page-link" href="second.html">About Me & Favorites</a>
      <a class="page-link" href="about-thefunwebsite.html">About thefunwebsite.com</a>
    </div>
  </main>

  <div class="audio-player" aria-label="Background music controls">
    <audio id="bg-audio" loop preload="auto" controls>
      <source src="Getaway Car - YouTube - Google Chrome 2026-06-17 14-11-07.mp4" type="audio/mp4" />
      Your browser does not support the audio element.
    </audio>
    <button id="audio-toggle" type="button" aria-pressed="false">Play/Pause Getaway Car</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
